name: Deploy Balto Source

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.0"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Build project
        run: |
          npm ci
          npm run build
          npm prune --production 

      - name: Deploy to Landing Zone
        uses: appleboy/scp-action@master
        with:
          host: ${{secrets.SERVER_HOST}}
          username: ${{secrets.SERVER_USER}}
          key: ${{secrets.SSH_PRIVATE_KEY}}
          source: "frontend/build,frontend/package.json,frontend/node_modules"
          target: "/home/ghactions/deploy_temp" 
          strip_components: 1

      - name: Move files and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.SERVER_HOST}}
          username: ${{secrets.SERVER_USER}}
          key: ${{secrets.SSH_PRIVATE_KEY}}
          script: |
            set -euo pipefail
            
            TARGET_DIR="/srv/baltosource/frontend"
            TEMP_DIR="/home/ghactions/deploy_temp"
            SERVICE_USER="baltosource"
            
            # Sync, but preserve runtime config files
            sudo /usr/bin/rsync -a --delete \
              --exclude='.env' \
              --exclude='.env.*' \
              "$TEMP_DIR/" "$TARGET_DIR/"
            
            # Fix ownership
            sudo /usr/bin/chown -R "$SERVICE_USER:$SERVICE_USER" "$TARGET_DIR"
            
            # Clear any failed state, then restart
            sudo /usr/bin/systemctl reset-failed baltosource-frontend || true
            sudo /usr/bin/systemctl restart baltosource-frontend
            
            # Verify it actually came up
            sleep 2
            /usr/bin/systemctl is-active baltosource-frontend
            
            # Cleanup only if everything succeeded
            rm -rf "$TEMP_DIR"/*
